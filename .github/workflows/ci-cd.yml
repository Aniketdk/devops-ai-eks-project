name: Build and Deploy to EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  CLUSTER_NAME: ai-eks-cluster
  DOCKER_IMAGE: aniketdk/ai-app

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    #  Configure AWS Credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # Login to DockerHub
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    #  Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t $DOCKER_IMAGE:${{ github.sha }} .
        docker tag $DOCKER_IMAGE:${{ github.sha }} $DOCKER_IMAGE:latest

    #  Push Docker Image
    - name: Push Docker Image
      run: |
        docker push $DOCKER_IMAGE:${{ github.sha }}
        docker push $DOCKER_IMAGE:latest

    #  Connect to EKS Cluster
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

    #  Deploy to Kubernetes
    - name: Deploy to EKS
      run: |
        kubectl apply -f k8s/
        kubectl set image deployment/ai-app-deployment ai-app=$DOCKER_IMAGE:${{ github.sha }}
        kubectl rollout status deployment/ai-app-deployment
