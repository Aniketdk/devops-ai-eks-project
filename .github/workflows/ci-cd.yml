name: CI-CD to EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy to EKS
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # 3️⃣ Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4️⃣ Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-app:${{ github.sha }} .

      # 5️⃣ Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-app:${{ github.sha }}

      # 6️⃣ Install kubectl
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/stable.txt"
          VERSION=$(cat stable.txt)
          curl -LO "https://dl.k8s.io/release/$VERSION/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # 7️⃣ Update kubeconfig
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ap-south-1 --name cicd-eks-cluster

      # 8️⃣ Update Deployment Image
      - name: Update Kubernetes Image
        run: |
               kubectl set image deployment/ai-app 
               ai-app=${{ secrets.DOCKER_USERNAME }}/ai-app:${{ github.sha }}

      # 9️⃣ Apply Kubernetes Files
      - name: Deploy to EKS
        run: |
          kubectl apply -f deployment.yml
          kubectl apply -f service.yml

      # 🔟 Verify Deployment
      - name: Verify Pods
        run: |
          kubectl get pods
          kubectl get svc





